---
# DCBX/PFC configuration for ConnectX-7 QSFP interfaces.
# Sets trust=dscp + PFC on the RoCE traffic class to match the switch config.
# Persisted via systemd oneshot service (mlnx_qos settings are lost on reboot).
# Gated by set_dcbx_manually (default: false).

- name: Build PFC bitmask string
  ansible.builtin.set_fact:
    pfc_string: "{% for i in range(8) %}{{ '1' if i == qsfp_dcbx_roce_tc else '0' }}{{ ',' if not loop.last }}{% endfor %}"
  when: set_dcbx_manually | default(false)

- name: Deploy DCBX/PFC systemd service
  ansible.builtin.template:
    src: qsfp_dcbx.service.j2
    dest: /etc/systemd/system/qsfp-dcbx.service
    mode: "0644"
  register: _dcbx_unit
  when: set_dcbx_manually | default(false)

- name: Enable and start DCBX/PFC service
  ansible.builtin.systemd:
    name: qsfp-dcbx.service
    daemon_reload: "{{ _dcbx_unit is changed }}"
    enabled: true
    state: "{{ 'restarted' if _dcbx_unit is changed else 'started' }}"
  when: set_dcbx_manually | default(false)

- name: Verify DCBX/PFC settings
  ansible.builtin.command: mlnx_qos -i {{ qsfp_sriov_pf_iface }}
  register: _dcbx_status
  when: set_dcbx_manually | default(false)
  changed_when: false

- name: Show DCBX/PFC status
  ansible.builtin.debug:
    msg: "{{ _dcbx_status.stdout }}"
  when: set_dcbx_manually | default(false) and _dcbx_status is defined

# Cleanup: remove service when disabled
- name: Check if DCBX service exists
  ansible.builtin.stat:
    path: /etc/systemd/system/qsfp-dcbx.service
  register: _dcbx_unit_file
  when: not (set_dcbx_manually | default(false))

- name: Stop and disable DCBX/PFC service
  ansible.builtin.systemd:
    name: qsfp-dcbx.service
    enabled: false
    state: stopped
  when: not (set_dcbx_manually | default(false)) and _dcbx_unit_file.stat.exists | default(false)

- name: Remove DCBX/PFC service file
  ansible.builtin.file:
    path: /etc/systemd/system/qsfp-dcbx.service
    state: absent
  when: not (set_dcbx_manually | default(false)) and _dcbx_unit_file.stat.exists | default(false)
