---
# hostPath base directory on k3smaster
k8s_infra_data_base: "/var/lib/k8s-data"
# Subdirectories: postgresql, redis, keel, loki, grafana, grafana-dashboards,
#                 prometheus, alertmanager, uptimekuma, tang, pgbackup

# Secrets (overridden by vault)
postgresql_postgres_password: "changeme"
postgresql_openwebui_password: "changeme"
grafana_admin_password: "changeme"
grafana_root_url: "https://grafana.example.com"
keel_basic_auth_password: "changeme"
keel_gotify_token: "CHANGEME_GOTIFY_TOKEN"
keel_gotify_url: "https://gotify.example.com"
alertmanager_smtp_smarthost: "mail.example.com:25"
alertmanager_smtp_mailfrom: "alertmanager@example.com"
alertmanager_alert_email: "admin@example.com"
alertmanager_gotify_token: "CHANGEME_GOTIFY_TOKEN"
alertmanager_gotify_url: "https://gotify.example.com"
traefik_internal_allowlist:
  - "192.168.123.0/24"
  - "192.168.124.0/24"
nut_exporter_server: "192.168.124.100"
nut_exporter_username: "monuser"
nut_exporter_password: "changeme"
# nut_ups_name, nut_ups_secondary_name — defined in group_vars/all/main.yml
traefik_dashboard_password: "changeme"

# KCEVE KVM RS232 serial device on k3smaster (USB-to-RS232 adapter)
kceve_kvm_serial_device: "/dev/ttyACM0"

# === Nous Hermes Agent (per-user deployments) ===
# Image is multi-arch (amd64+arm64); pinned on k3smaster (amd64) — never on sparks.
hermes_namespace: "hermes"
hermes_image_tag: "v2026.4.30"
# NFS-backed hostPath base on k3smaster — per-user subdirs <base>/<username>
# are mounted as /opt/data inside the pod (subdir-only, no parent visibility).
hermes_data_base: "/mnt/nfs/hermes"
hermes_default_model: "Qwen/Qwen3.6-35B-A3B-FP8"
hermes_litellm_url: "http://litellm.litellm.svc.cluster.local:4000"
# Per-user list — real entries in group_vars/all/vault.yml.
# Schema: { username, uid, gid, litellm_token, litellm_model (optional),
#           basicauth_password (optional), enabled }
hermes_users: []