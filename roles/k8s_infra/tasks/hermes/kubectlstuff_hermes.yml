---
# Per-user Nous Hermes Agent deployment.
# Pinned to k3smaster (amd64, NFS-local). Loop key: hermes_users (vault).

- name: Filter enabled hermes users
  ansible.builtin.set_fact:
    _hermes_active_users: "{{ hermes_users | selectattr('enabled', 'true') | list }}"

- name: Create hermes namespace
  kubernetes.core.k8s:
    name: "{{ hermes_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Render per-user hermes config.yaml ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "hermes-config-{{ item.username }}"
        namespace: "{{ hermes_namespace }}"
        labels:
          app: hermes
          hermes-user: "{{ item.username }}"
      data:
        config.yaml: "{{ lookup('template', 'hermes_config.yaml.j2') }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Render per-user hermes .env Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "hermes-env-{{ item.username }}"
        namespace: "{{ hermes_namespace }}"
        labels:
          app: hermes
          hermes-user: "{{ item.username }}"
      type: Opaque
      stringData:
        ".env": "{{ lookup('template', 'hermes_env.j2') }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Create per-user hermes BasicAuth Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "hermes-basicauth-{{ item.username }}"
        namespace: "{{ hermes_namespace }}"
        labels:
          app: hermes
          hermes-user: "{{ item.username }}"
      type: Opaque
      stringData:
        users: "{{ lookup('pipe', 'htpasswd -nbB ' ~ item.username ~ ' ' ~ (item.basicauth_password | default(item.litellm_token))) }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Create per-user hermes BasicAuth Middleware
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: "hermes-basicauth-{{ item.username }}"
        namespace: "{{ hermes_namespace }}"
      spec:
        basicAuth:
          secret: "hermes-basicauth-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Create per-user hermes Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "hermes-{{ item.username }}"
        namespace: "{{ hermes_namespace }}"
        labels:
          app: hermes
          hermes-user: "{{ item.username }}"
      spec:
        selector:
          app: hermes
          hermes-user: "{{ item.username }}"
        ports:
          - name: dashboard
            port: 9119
            targetPort: 9119
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Create per-user hermes Deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "hermes-{{ item.username }}"
        namespace: "{{ hermes_namespace }}"
        labels:
          app: hermes
          hermes-user: "{{ item.username }}"
      spec:
        replicas: 1
        strategy:
          type: Recreate
        selector:
          matchLabels:
            app: hermes
            hermes-user: "{{ item.username }}"
        template:
          metadata:
            labels:
              app: hermes
              hermes-user: "{{ item.username }}"
          spec:
            restartPolicy: Always
            # Hermes pods stay on k3smaster (amd64, NFS-local). Never on sparks.
            nodeSelector:
              node-role: k3smaster
            securityContext:
              runAsUser: "{{ item.uid }}"
              runAsGroup: "{{ item.gid }}"
              fsGroup: "{{ item.gid }}"
              runAsNonRoot: true
            initContainers:
              # hostPath DirectoryOrCreate creates the dir as 0755 root:root.
              # Reset to <uid>:<gid> 0700 so the user owns their own data dir
              # and other users cannot read it (even if NFS share is browsed).
              - name: fix-perms
                image: busybox:1.37
                command:
                  - sh
                  - -c
                  - "chown {{ item.uid }}:{{ item.gid }} /opt/data && chmod 0700 /opt/data"
                securityContext:
                  runAsUser: 0
                  runAsNonRoot: false
                volumeMounts:
                  - name: data
                    mountPath: /opt/data
            containers:
              - name: hermes
                image: "nousresearch/hermes-agent:{{ item.image_tag | default(hermes_image_tag) }}"
                imagePullPolicy: IfNotPresent
                # `dashboard` serves the web UI + chat (with --tui) on port 9119.
                # --insecure is required to bind beyond 127.0.0.1; BasicAuth is
                # enforced upstream by the per-user Traefik middleware.
                # `gateway run` (the docker default) only handles messaging
                # platforms (Telegram/Discord/WhatsApp) — not what we want.
                command: ["/opt/hermes/.venv/bin/hermes"]
                args:
                  - "dashboard"
                  - "--host=0.0.0.0"
                  - "--port=9119"
                  - "--no-open"
                  - "--insecure"
                  - "--tui"
                ports:
                  - containerPort: 9119
                    name: dashboard
                resources:
                  requests:
                    cpu: "100m"
                    memory: "256Mi"
                  limits:
                    cpu: "{{ item.cpu_limit | default('2') }}"
                    memory: "{{ item.memory_limit | default('2Gi') }}"
                volumeMounts:
                  - name: data
                    mountPath: /opt/data
                  - name: config
                    mountPath: /opt/data/config.yaml
                    subPath: config.yaml
                  - name: env
                    mountPath: /opt/data/.env
                    subPath: .env
                livenessProbe:
                  tcpSocket:
                    port: 9119
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  failureThreshold: 5
                readinessProbe:
                  tcpSocket:
                    port: 9119
                  initialDelaySeconds: 15
                  periodSeconds: 10
            volumes:
              - name: data
                hostPath:
                  path: "{{ hermes_data_base }}/{{ item.username }}"
                  type: DirectoryOrCreate
              - name: config
                configMap:
                  name: "hermes-config-{{ item.username }}"
                  items:
                    - key: config.yaml
                      path: config.yaml
              - name: env
                secret:
                  secretName: "hermes-env-{{ item.username }}"
                  items:
                    - key: .env
                      path: .env
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Create per-user hermes TLS Certificate
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "hermes-{{ item.username }}.{{ dns_external_domain_suffix }}"
        namespace: "{{ hermes_namespace }}"
      spec:
        dnsNames:
          - "hermes-{{ item.username }}.{{ dns_external_domain_suffix }}"
        secretName: "hermes-{{ item.username }}.{{ dns_external_domain_suffix }}"
        issuerRef:
          name: letsencrypt-production
          kind: ClusterIssuer
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Create per-user hermes IngressRoute (Dashboard, port 9119)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "hermes-{{ item.username }}-dashboard"
        namespace: "{{ hermes_namespace }}"
      spec:
        entryPoints:
          - websecure
        routes:
          - kind: Rule
            match: "Host(`hermes-{{ item.username }}.{{ dns_external_domain_suffix }}`)"
            priority: 10
            services:
              - kind: Service
                name: "hermes-{{ item.username }}"
                passHostHeader: true
                port: 9119
            middlewares:
              - name: "hermes-basicauth-{{ item.username }}"
        tls:
          secretName: "hermes-{{ item.username }}.{{ dns_external_domain_suffix }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Register DNS A record for hermes (dashboard)
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "hermes-{{ item.username }}.{{ dns_external_domain_suffix }}."
    type: A
    ttl: "{{ nsupdate_ttl }}"
    value: "{{ nsupdate_ingress_ip }}"
    state: present
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"