---
- name: install fortune if needed
  apt:
    pkg:
      - fortune-mod
      - fortunes
      - fortunes-bofh-excuses
      - fortunes-debian-hints
      # - fortunes-de
    state: present
  register: fortuneinstalled

- name: install fotune-databases for Ubuntu
  apt:
    pkg:
      - fortunes-ubuntu-server
      # - fortunes-off
      - fortunes-bofh-excuses
    state: present
  when: fortuneinstalled.changed and ansible_distribution == 'Ubuntu'

- name: config fortune into update-motd
  copy:
    src: 99-fortune
    dest: "/etc/update-motd.d/99-fortune"
    owner: root
    group: root
    mode: '0755'
  when: fortuneinstalled.changed

- name: ensure /etc/motd is empty
  copy:
    content: ""
    dest: /etc/motd
    force: true
    owner: root
    group: root
    mode: '0644'
  when: fortuneinstalled.changed and ansible_distribution == 'Debian'