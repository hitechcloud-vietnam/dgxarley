- name: update network-wait-service
  template:
    src: "etc_systemd_system_systemd-networkd-wait-online_service_d_override.conf.j2"
    dest: "/etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf"
    owner: root
    group: root
    mode: '0644'
  register: updatenetworkwait
  # when: networkdoverride.stat.exists == False


- name: systemd reload daemon
  systemd_service:
    daemon_reload: true
  when:
    - updatenetworkwait.changed