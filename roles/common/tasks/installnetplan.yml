- name: check if networkd-wait-override exists
  stat:
    path: "/etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf"
  register: networkdoverride

- name: slurp network-wait-service
  slurp:
    src: "/etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf"
  register: nws
  when: networkdoverride.stat.exists == True

- name: ensures /etc/systemd/system/systemd-networkd-wait-online.service.d exists
  file:
    path: "/etc/systemd/system/systemd-networkd-wait-online.service.d"
    state: directory

