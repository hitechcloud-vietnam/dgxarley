---
- name: Deploy K8s infrastructure for DGX cluster
  hosts: k3smaster
  connection: local
  become: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  module_defaults:
    group/kubernetes.core.k8s:
      context: "{{ kubeconfig_context_name }}"
  roles:
    - k8s_infra
